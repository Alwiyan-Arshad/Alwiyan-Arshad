<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact & Social Links</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    /* ─────────────────────────────────────
       ROOT VARIABLES
    ───────────────────────────────────── */
    :root {
      --gold:      #d4af6a;
      --gold2:     #f5d88e;
      --cyan:      #5ce1e6;
      --deep:      #060a14;
      --glass:     rgba(255,255,255,0.055);
      --border:    rgba(212,175,106,0.25);

      --wa:   #25D366;
      --fb:   #1877F2;
      --tt:   #ffffff;
      --ig:   #E1306C;
      --yt:   #FF0000;
      --em:   #FFD700;
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    body {
      min-height: 100vh;
      background: var(--deep);
      font-family: 'Raleway', sans-serif;
      color: #f0eee8;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* ─────────────────────────────────────
       BACKGROUND IMAGE — Online Unsplash
    ───────────────────────────────────── */
    .bg-img {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.18) saturate(1.3);
    }

    /* ─────────────────────────────────────
       AMBIENT ORBS
    ───────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.16;
      pointer-events: none;
      z-index: 1;
      animation: floatOrb 14s ease-in-out infinite alternate;
    }
    .orb1 { width:500px; height:500px; background:#1a3a5c; top:-120px; left:-150px; }
    .orb2 { width:350px; height:350px; background:#5c1a2a; bottom:5%; right:-100px; animation-delay:-5s; }
    .orb3 { width:280px; height:280px; background:#1a5c4a; top:45%; left:10%;  animation-delay:-9s; }
    @keyframes floatOrb {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(25px,20px) scale(1.12); }
    }

    /* ─────────────────────────────────────
       PARTICLE CANVAS
    ───────────────────────────────────── */
    #cvs {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ─────────────────────────────────────
       PAGE WRAPPER
    ───────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1100px;
      padding: 70px 24px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─────────────────────────────────────
       HEADING
    ───────────────────────────────────── */
    .heading-wrap {
      text-align: center;
      margin-bottom: 14px;
      opacity: 0;
      transform: translateY(-28px);
      animation: dropIn 0.9s cubic-bezier(.22,.68,0,1.3) forwards 0.2s;
    }
    @keyframes dropIn {
      to { opacity:1; transform:translateY(0); }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(30px, 6vw, 58px);
      letter-spacing: 7px;
      background: linear-gradient(135deg, var(--gold), var(--gold2), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .sub {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(240,238,232,0.4);
      text-transform: uppercase;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0 54px;
      opacity: 0;
      animation: dropIn 0.8s ease forwards 0.55s;
    }
    .divider span {
      height: 1px;
      width: clamp(60px, 14vw, 160px);
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .divider em { font-style:normal; color:var(--gold); font-size:16px; }

    /* ─────────────────────────────────────
       GRID OF SOCIAL CARDS
    ───────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 820px;
    }

    @media(max-width: 640px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media(max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ─── CARD ─── */
    .card {
      position: relative;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 36px 20px 28px;
      text-align: center;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-decoration: none;
      overflow: hidden;
      cursor: pointer;

      opacity: 0;
      transform: translateY(40px) scale(0.94);
      transition:
        opacity 0.6s ease,
        transform 0.6s ease,
        border-color 0.4s,
        box-shadow 0.4s,
        background 0.4s;
    }
    .card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .card:nth-child(1) { transition-delay: 0.05s; }
    .card:nth-child(2) { transition-delay: 0.12s; }
    .card:nth-child(3) { transition-delay: 0.19s; }
    .card:nth-child(4) { transition-delay: 0.26s; }
    .card:nth-child(5) { transition-delay: 0.33s; }
    .card:nth-child(6) { transition-delay: 0.40s; }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.09) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.55s ease;
    }
    .card:hover::after { transform: translateX(100%); }

    .card:hover { background: rgba(255,255,255,0.10); transform: translateY(-10px) scale(1.04) !important; }

    .card.wa:hover  { border-color:var(--wa);  box-shadow:0 0 40px rgba(37,211,102,0.35), 0 20px 50px rgba(0,0,0,0.5); }
    .card.fb:hover  { border-color:var(--fb);  box-shadow:0 0 40px rgba(24,119,242,0.35), 0 20px 50px rgba(0,0,0,0.5); }
    .card.tt:hover  { border-color:#69C9D0;    box-shadow:0 0 40px rgba(105,201,208,0.35), 0 20px 50px rgba(0,0,0,0.5); }
    .card.ig:hover  { border-color:var(--ig);  box-shadow:0 0 40px rgba(225,48,108,0.35),  0 20px 50px rgba(0,0,0,0.5); }
    .card.yt:hover  { border-color:var(--yt);  box-shadow:0 0 40px rgba(255,0,0,0.35),     0 20px 50px rgba(0,0,0,0.5); }
    .card.em:hover  { border-color:var(--em);  box-shadow:0 0 40px rgba(255,215,0,0.35),   0 20px 50px rgba(0,0,0,0.5); }

    /* ─── ICON CIRCLE ─── */
    .icon-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      position: relative;
      transition: transform 0.45s cubic-bezier(.22,.68,0,1.4);
      color: #f0eee8;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.14);
    }
    .card:hover .icon-ring { transform: rotate(-8deg) scale(1.18); }

    .icon-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--gold), transparent 60%, var(--cyan), transparent 90%, var(--gold));
      z-index: -1;
      opacity: 0;
      animation: spinRing 3s linear infinite;
      transition: opacity 0.4s;
    }
    .card:hover .icon-ring::before { opacity: 1; }
    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    .icon-ring::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: #0d1420;
      z-index: -1;
    }

    .card.wa:hover  .icon-ring { color: var(--wa); }
    .card.fb:hover  .icon-ring { color: var(--fb); }
    .card.tt:hover  .icon-ring { color: #69C9D0;   }
    .card.ig:hover  .icon-ring { color: var(--ig); }
    .card.yt:hover  .icon-ring { color: var(--yt); }
    .card.em:hover  .icon-ring { color: var(--em); }

    /* ─── LABEL ─── */
    .label {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 2.5px;
      color: rgba(240,238,232,0.75);
      text-transform: uppercase;
      transition: color 0.35s;
    }
    .card.wa:hover .label { color: var(--wa); }
    .card.fb:hover .label { color: var(--fb); }
    .card.tt:hover .label { color: #69C9D0;   }
    .card.ig:hover .label { color: var(--ig); }
    .card.yt:hover .label { color: var(--yt); }
    .card.em:hover .label { color: var(--em); }

    /* ─── RIPPLE ─── */
    .ripple-dot {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      pointer-events: none;
      animation: rippleAnim 0.7s linear;
    }
    @keyframes rippleAnim {
      to { transform: scale(5); opacity: 0; }
    }

    /* ─────────────────────────────────────
       PULSE RINGS
    ───────────────────────────────────── */
    .pulse-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 320px;
      border-radius: 50%;
      border: 1px solid rgba(212,175,106,0.12);
      animation: pulseExpand 3.5s ease-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .pulse-ring:nth-child(2) { animation-delay: 1.2s; }
    .pulse-ring:nth-child(3) { animation-delay: 2.4s; }
    @keyframes pulseExpand {
      0%   { transform:translate(-50%,-50%) scale(0.4); opacity:0.5; }
      100% { transform:translate(-50%,-50%) scale(2.4); opacity:0; }
    }

    .grid-wrap {
      position: relative;
      display: flex;
      justify-content: center;
    }

    /* ─────────────────────────────────────
       FOOTER
    ───────────────────────────────────── */
    .footer-line {
      margin-top: 60px;
      font-size: 12px;
      letter-spacing: 3px;
      color: rgba(240,238,232,0.25);
      text-transform: uppercase;
      opacity: 0;
      animation: dropIn 0.8s ease forwards 1s;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--deep); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--gold), var(--cyan));
      border-radius: 10px;
    }

    #cursor-glow {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(92,225,230,0.6), transparent 70%);
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <!-- ✅ SAME Online Unsplash background as skills page -->
  <img 
    class="bg-img" 
    src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80&auto=format&fit=crop" 
    alt=""
    loading="eager"
  />

  <!-- Ambient orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- Particles -->
  <canvas id="cvs"></canvas>

  <!-- Cursor glow -->
  <div id="cursor-glow"></div>

  <div class="page">

    <!-- HEADING -->
    <div class="heading-wrap">
      <h1>CONTACT ME</h1>
      <p class="sub">Let's build something great together</p>
    </div>

    <div class="divider">
      <span></span><em>✦</em><span></span>
    </div>

    <!-- CARDS GRID -->
    <div class="grid-wrap">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>

      <div class="grid">

        <a href="https://web.whatsapp.com/" class="card wa reveal">
          <div class="icon-ring"><i class="fab fa-whatsapp"></i></div>
          <div class="label">WhatsApp</div>
        </a>

        <a href="#" class="card fb reveal">
          <div class="icon-ring"><i class="fab fa-facebook"></i></div>
          <div class="label">Facebook</div>
        </a>

        <a href="https://www.tiktok.com/en/" class="card tt reveal">
          <div class="icon-ring"><i class="fab fa-tiktok"></i></div>
          <div class="label">TikTok</div>
        </a>

        <a href="https://www.instagram.com/?hl=en" class="card ig reveal">
          <div class="icon-ring"><i class="fab fa-instagram"></i></div>
          <div class="label">Instagram</div>
        </a>

        <a href="https://www.youtube.com/" class="card yt reveal">
          <div class="icon-ring"><i class="fab fa-youtube"></i></div>
          <div class="label">YouTube</div>
        </a>

        <a href="https://mail.google.com/mail/u/0/#inbox/FMfcgzQgLFmXTrRtTpbvpjcMPLPbDcQd" class="card em reveal">
          <div class="icon-ring"><i class="fas fa-envelope"></i></div>
          <div class="label">Email</div>
        </a>

      </div>
    </div>

    <p class="footer-line">© 2025 &nbsp;·&nbsp; All rights reserved</p>
  </div>

  <script>
    /* PARTICLES */
    (function(){
      const cvs = document.getElementById('cvs');
      const ctx = cvs.getContext('2d');
      const resize = () => { cvs.width = innerWidth; cvs.height = innerHeight; };
      resize();
      addEventListener('resize', resize);

      const stars = Array.from({length:100}, () => ({
        x: Math.random()*innerWidth,
        y: Math.random()*innerHeight,
        r: Math.random()*1.3 + 0.3,
        pulse: Math.random()*Math.PI*2,
        speed: Math.random()*0.25 + 0.06,
      }));

      (function draw(){
        ctx.clearRect(0,0,cvs.width,cvs.height);
        stars.forEach(s => {
          s.pulse += 0.013;
          const alpha = 0.25 + 0.55*Math.abs(Math.sin(s.pulse));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(210,215,235,${alpha})`;
          ctx.fill();
          s.y -= s.speed;
          if(s.y < -2){ s.y = innerHeight+2; s.x = Math.random()*innerWidth; }
        });
        requestAnimationFrame(draw);
      })();
    })();

    /* SCROLL REVEAL */
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    /* RIPPLE ON CLICK */
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', e => {
        const r  = card.getBoundingClientRect();
        const x  = e.clientX - r.left;
        const y  = e.clientY - r.top;
        const sz = Math.max(r.width, r.height);
        const dot = document.createElement('div');
        dot.className = 'ripple-dot';
        Object.assign(dot.style, {
          left: (x - sz/2)+'px',
          top:  (y - sz/2)+'px',
          width: sz+'px',
          height: sz+'px',
          background: 'rgba(255,255,255,0.12)',
        });
        card.appendChild(dot);
        dot.addEventListener('animationend', () => dot.remove());
      });
    });

    /* MAGNETIC HOVER */
    document.querySelectorAll('.card').forEach(card => {
      const ring = card.querySelector('.icon-ring');
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        const cx = r.left + r.width/2;
        const cy = r.top  + r.height/2;
        const dx = (e.clientX - cx) / (r.width/2);
        const dy = (e.clientY - cy) / (r.height/2);
        ring.style.transform = `rotate(-8deg) scale(1.18) translate(${dx*6}px,${dy*6}px)`;
      });
      card.addEventListener('mouseleave', () => {
        ring.style.transform = '';
      });
    });

    /* CURSOR GLOW */
    const glow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', e => {
      glow.style.left    = e.clientX+'px';
      glow.style.top     = e.clientY+'px';
      glow.style.opacity = '1';
    });
    document.addEventListener('mouseleave', () => glow.style.opacity = '0');
  </script>
</body>
</html>
